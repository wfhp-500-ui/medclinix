function NoteTab({shared,onSave}){const[inp,setInp]=useState("");const[prev,setPrev]=useState("");const[note,setNote]=useState("");const[busy,setBusy]=useState(false);const[mode,setMode]=useState("new");const[fmt,setFmt]=useState("standard");const[listening,setListening]=useState(false);const sr=useRef(null);const applied=useRef("");useEffect(()=>{if(shared&&shared!==applied.current){setInp(shared);applied.current=shared;}},[shared]);const toggleVoice=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return alert("Voice input requires Chrome.");if(listening){sr.current?.stop();setListening(false);return;}const r=new SR();r.continuous=true;r.interimResults=true;r.onresult=e=>setInp(Array.from(e.results).map(x=>x[0].transcript).join(""));r.onerror=()=>setListening(false);r.onend=()=>setListening(false);r.start();sr.current=r;setListening(true);};const generate=async()=>{if(!inp.trim())return;setBusy(true);try{const cw=fmt==="careware"?" Use CareWare EMR format.":"";const sys=mode==="delta"?"Generate concise SOAP progress note."+cw+" Write Unchanged for unchanged items.":"ER/Internal Medicine physician. Generate comprehensive clinical note from shorthand. Include CC, HPI, PMH, Meds, Allergies, ROS (12 systems), PE (9 systems), Labs, ECG, Imaging, Assessment and Plan (numbered)."+cw;const prompt=mode==="delta"?"PREVIOUS:

"9px 12px",marginBottom:8}}><div style={{color:K.yellow,fontWeight:800,fontSize:11,letterSpacing:1.5,marginBottom:4}}>💡 CLINICAL PEARL</div><p style={{color:"#fde68a",fontSize:13,lineHeight:1.6,margin:0}}>{d.pearl}</p></div>}{d.complications&&<div style={{background:K.red+"12",border:"1px solid "+K.red+"30",borderRadius:7,padding:"9px 12px",marginBottom:8}}><div style={{color:K.red,fontWeight:800,fontSize:11,letterSpacing:1.5,marginBottom:4}}>⚠️ MUST-KNOW COMPLICATIONS</div><p style={{color:"#fca5a5",fontSize:13,lineHeight:1.6,margin:0}}>{d.complications}</p></div>}<div style={{borderTop:"1px solid "+K.border,paddingTop:9}}><div style={{color:K.muted,fontSize:11,letterSpacing:1,marginBottom:6}}>REFERENCES</div><div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{[["UpToDate",K.green,"https://www.uptodate.com/contents/search?search="+encodeURIComponent(d.dx)],["PubMed",K.blue,"https://pubmed.ncbi.nlm.nih.gov/?term="+encodeURIComponent(d.dx)],["WikEM",K.orange,"https://wikem.org/wiki/"+encodeURIComponent(d.dx.replace(/ /g,"_"))]].map(([n,col,url])=><a key={n} href={url} target="_blank" rel="noopener noreferrer" style={{background:col+"20",color:col,border:"1px solid "+col+"40",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,textDecoration:"none"}}>{n}</a>)}</div></div></div>}</div>;})} {ddx.length===0&&!busy&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,color:K.muted,fontSize:14,textAlign:"center",lineHeight:1.8}}>Enter a clinical case on the left<br/>and click Generate</div>}</div></div>);}

function App(){const[tab,setTab]=useState("flash");const[sharedDraft,setSharedDraft]=useState("");const[shared,setShared]=useState("");const[showShared,setShowShared]=useState(false);const[history,setHistory]=useState([]);const save=s=>setHistory(p=>[s,...p].slice(0,20));const TABS=[{id:"flash",icon:"🃏",label:"Flashcards"},{id:"note",icon:"📝",label:"Clinical Note"},{id:"ddx",icon:"🔬",label:"DDx"},{id:"history",icon:"🕓",label:"History"}];return(<div style={{background:K.bg,minHeight:"100vh",color:K.text}}><div style={{background:K.card,borderBottom:"1px solid "+K.border,padding:"11px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}><div style={{display:"flex",alignItems:"baseline",gap:10}}><span style={{fontWeight:900,fontSize:20,background:"linear-gradient(135deg,"+K.blue+","+K.purple+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>MedClinix</span><span style={{color:K.muted,fontSize:12}}>AI Clinical Suite</span></div><button onClick={()=>setShowShared(s=>!s)} style={{background:shared?K.green+"18":showShared?K.blue+"20":K.card2,color:shared?K.green:showShared?K.blue:K.muted,border:"1px solid "+(shared?K.green+"50":showShared?K.blue+"50":K.border),borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔗 {shared?"Shared Case ✓":"Share Case"}</button></div>{showShared&&<div style={{background:K.card2,borderBottom:"1px solid "+K.border,padding:"14px 24px"}}><label style={{color:K.muted,fontSize:11,letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:6}}>Shared Case — auto-fills all three tools</label><div style={{display:"flex",gap:8,alignItems:"flex-start"}}><textarea value={sharedDraft} onChange={e=>setSharedDraft(e.target.value)} rows={3} placeholder="Paste clinical case once — all tabs will use it..." style={{flex:1,background:K.inp,border:"1px solid "+K.border,borderRadius:8,color:K.text,padding:"10px 12px",fontSize:13,resize:"none",outline:"none"}}/><div style={{display:"flex",flexDirection:"column",gap:6}}><button onClick={()=>{setShared(sharedDraft);setShowShared(false);}} style={{background:K.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:800,cursor:"pointer"}}>Apply</button><button onClick={()=>{setShared("");setSharedDraft("");}} style={{background:K.card,color:K.muted,border:"1px solid "+K.border,borderRadius:8,padding:"7px 16px",fontWeight:600,cursor:"pointer",fontSize:12}}>Clear</button></div></div></div>}<div style={{background:K.card,borderBottom:"1px solid "+K.border,display:"flex",paddingLeft:16}}>{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",borderBottom:"2.5px solid "+(tab===t.id?K.blue:"transparent"),color:tab===t.id?K.blue:K.muted,padding:"12px 18px",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}><span>{t.icon}</span><span>{t.label}</span>{t.id==="history"&&history.length>0&&<span style={{background:K.blue+"30",color:K.blue,borderRadius:10,padding:"0 6px",fontSize:11}}>{history.length}</span>}</button>)}</div><div style={{padding:"20px 24px",maxWidth:1300,margin:"0 auto"}}>{tab==="flash"&&<FlashTab shared={shared} onSave={save}/>}{tab==="note"&&<NoteTab shared={shared} onSave={save}/>}{tab==="ddx"&&<DDxTab shared={shared} onSave={save}/>}{tab==="history"&&<HistoryPanel items={history}/>}</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
